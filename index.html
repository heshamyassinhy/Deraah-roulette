<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - ميكي ماوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }

        /* حاوية العجلة لضمان التمركز المطلق */
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 600px; 
            aspect-ratio: 1 / 1; 
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* شخصية ميكي ماوس */
        .mickey-char {
            position: absolute;
            bottom: -20px;
            right: -80px;
            width: 200px;
            z-index: 30;
            pointer-events: none;
        }

        .character-arm {
            transform-origin: 140px 100px;
        }

        .spinning .character-arm {
            animation: pull-arm 0.6s ease-in-out;
        }

        @keyframes pull-arm {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-30deg); }
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ffeb3b;
            z-index: 40;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .spin-btn {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .spin-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        /* تحسين مظهر المدخلات لضمان وضوح النص والقوائم */
        input, textarea, select {
            background: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
        }

        /* لضمان أن النص داخل الـ select يظهر بوضوح عند فتحه */
        select option {
            background-color: #1a1a2e !important;
            color: white !important;
        }

        .modal-winner {
            animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="glass-panel p-6 w-full max-w-4xl shadow-2xl">
        
        <!-- المرحلة 1: إدخال الأسماء -->
        <div id="step1" class="text-center">
            <h1 class="text-4xl font-black mb-6 text-yellow-400">مهرجان الحظ مع ميكي</h1>
            <textarea id="namesInput" rows="6" class="w-full p-4 rounded-2xl text-lg focus:ring-2 focus:ring-yellow-400 outline-none mb-6" placeholder="اكتب الأسماء هنا، كل اسم في سطر..."></textarea>
            <button onclick="goToStep2()" class="w-full spin-btn py-4 rounded-2xl text-2xl font-bold text-black">استمرار ✨</button>
        </div>

        <!-- المرحلة 2: إعدادات التحكم والنسب المئوية -->
        <div id="step2" class="hidden text-center">
            <h2 class="text-3xl font-bold mb-6 text-yellow-400">إعدادات التحكم السرية 🕵️‍♂️</h2>
            
            <div class="bg-white/5 p-6 rounded-2xl mb-6 flex items-center gap-4 border border-yellow-500/20">
                <input type="checkbox" id="enableSpecial" class="w-8 h-8 accent-yellow-500 cursor-pointer" onchange="toggleSpecial()">
                <label for="enableSpecial" class="text-xl font-bold cursor-pointer">تفعيل وضع "المتحكم الخفي"</label>
            </div>

            <div id="specialControls" class="hidden mb-6 space-y-4 max-h-[350px] overflow-y-auto pr-2">
                <div id="conditionsList" class="space-y-4"></div>
                <button onclick="addConditionRow()" class="text-yellow-400 font-bold hover:text-yellow-300 underline">+ إضافة خطة فوز جديدة</button>
            </div>

            <div class="flex gap-4">
                <button onclick="showStep(1)" class="flex-1 bg-white/10 py-4 rounded-2xl font-bold hover:bg-white/20">رجوع</button>
                <button onclick="goToStep3()" class="flex-1 spin-btn py-4 rounded-2xl text-black font-bold">تجهيز العجلة 🚀</button>
            </div>
        </div>

        <!-- المرحلة 3: العجلة الكبيرة -->
        <div id="step3" class="hidden text-center relative">
            <h2 class="text-2xl font-black text-yellow-400 mb-6 uppercase tracking-widest">حظك يا بطل مع ميكي!</h2>
            
            <div class="wheel-container" id="wheelFrame">
                <div class="pointer"></div>
                
                <!-- ميكي ماوس -->
                <div class="mickey-char">
                    <svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="60" cy="50" r="35" fill="black"/>
                        <circle cx="140" cy="50" r="35" fill="black"/>
                        <circle cx="100" cy="100" r="55" fill="black"/>
                        <ellipse cx="100" cy="115" rx="45" ry="40" fill="#FFDBAC"/>
                        <ellipse cx="85" cy="100" rx="18" ry="25" fill="white"/>
                        <ellipse cx="115" cy="100" rx="18" ry="25" fill="white"/>
                        <circle cx="85" cy="105" r="5" fill="black"/>
                        <circle cx="115" cy="105" r="5" fill="black"/>
                        <ellipse cx="100" cy="125" rx="12" ry="7" fill="black"/>
                        <path d="M75 135 Q100 155 125 135" stroke="black" fill="none" stroke-width="3" stroke-linecap="round"/>
                        <rect x="75" y="155" width="50" height="60" fill="red" rx="10"/>
                        <circle cx="88" cy="180" r="6" fill="white"/>
                        <circle cx="112" cy="180" r="6" fill="white"/>
                        <g class="character-arm" id="mickeyArm">
                            <path d="M75 165 L20 120" stroke="black" stroke-width="12" stroke-linecap="round"/>
                            <circle cx="20" cy="120" r="18" fill="white" stroke="black" stroke-width="2"/>
                        </g>
                    </svg>
                </div>

                <canvas id="wheelCanvas" width="800" height="800"></canvas>
            </div>

            <div class="mt-10">
                <button id="spinBtn" onclick="startSpin()" class="spin-btn px-16 py-5 rounded-full text-3xl font-black text-black">لف العجلة!</button>
                <p id="counter" class="mt-4 text-gray-400"></p>
            </div>
        </div>
    </div>

    <!-- نافذة الفائز -->
    <div id="winnerModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[100] p-6">
        <div class="modal-winner bg-gray-900 border-4 border-yellow-500 p-10 rounded-[3rem] text-center max-w-md w-full shadow-2xl">
            <div class="text-7xl mb-4">🏆</div>
            <h3 class="text-2xl text-yellow-400 mb-2">الفائز هو:</h3>
            <div id="winnerText" class="text-5xl font-black text-white mb-8"></div>
            <button onclick="closeWinner()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-bold text-xl hover:bg-yellow-400">استمرار</button>
        </div>
    </div>

    <audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>

    <script>
        let names = [];
        let conditions = [];
        let spinCount = 0;
        let isSpinning = false;
        let selectedIndex = -1;

        const colors = [
            ['#f44336', '#b71c1c'], ['#9c27b0', '#4a148c'], ['#2196f3', '#0d47a1'],
            ['#4caf50', '#1b5e20'], ['#ffeb3b', '#f57f17'], ['#ff9800', '#e65100'],
            ['#00bcd4', '#006064'], ['#795548', '#3e2723']
        ];

        function showStep(s) {
            document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('step' + s).classList.remove('hidden');
        }

        function toggleSpecial() {
            document.getElementById('specialControls').classList.toggle('hidden', !document.getElementById('enableSpecial').checked);
            if (document.getElementById('conditionsList').children.length === 0) addConditionRow();
        }

        function addConditionRow() {
            const list = document.getElementById('conditionsList');
            const row = document.createElement('div');
            row.className = "p-4 bg-white/10 border border-yellow-500/20 flex flex-wrap gap-4 items-end rounded-2xl";
            
            let options = names.map(n => `<option value="${n}">${n}</option>`).join('');
            
            row.innerHTML = `
                <div class="flex-1 min-w-[150px]">
                    <label class="text-xs text-yellow-500 block mb-1 font-bold">الاسم المختار</label>
                    <select class="cond-name w-full p-2 rounded-lg bg-gray-800 border border-white/10 text-white">${options}</select>
                </div>
                <div class="w-24">
                    <label class="text-xs text-yellow-500 block mb-1 font-bold">النسبة %</label>
                    <input type="number" class="cond-percent w-full p-2 rounded-lg bg-gray-800 border border-white/10 text-white" value="100" min="0" max="100">
                </div>
                <div class="w-24">
                    <label class="text-xs text-yellow-500 block mb-1 font-bold">رقم اللفة</label>
                    <input type="number" class="cond-turn w-full p-2 rounded-lg bg-gray-800 border border-white/10 text-white" value="1" min="1">
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-500 text-2xl font-bold px-2">×</button>
            `;
            list.appendChild(row);
        }

        function goToStep2() {
            const val = document.getElementById('namesInput').value.trim();
            names = val.split('\n').map(n => n.trim()).filter(n => n !== "");
            if (names.length < 2) return alert("من فضلك أدخل اسمين على الأقل");
            showStep(2);
        }

        function goToStep3() {
            conditions = [];
            if (document.getElementById('enableSpecial').checked) {
                document.querySelectorAll('#conditionsList > div').forEach(row => {
                    conditions.push({
                        name: row.querySelector('.cond-name').value,
                        percent: parseInt(row.querySelector('.cond-percent').value),
                        turn: parseInt(row.querySelector('.cond-turn').value)
                    });
                });
            }
            showStep(3);
            setTimeout(drawWheel, 100);
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = cx - 20;
            const slice = (Math.PI * 2) / names.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = i * slice;
                const grad = ctx.createRadialGradient(cx, cy, 50, cx, cy, radius);
                grad.addColorStop(0, colors[i % colors.length][0]);
                grad.addColorStop(1, colors[i % colors.length][1]);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, angle, angle + slice);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle + slice / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Cairo";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 5;
                ctx.fillText(name.substring(0, 15), radius - 40, 15);
                ctx.restore();
            });

            // Center Bolt
            ctx.beginPath();
            ctx.arc(cx, cy, 35, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 5;
            ctx.stroke();
            
            document.getElementById('counter').innerText = `الأسماء المتبقية: ${names.length}`;
        }

        function startSpin() {
            if (isSpinning || names.length === 0) return;
            isSpinning = true;
            spinCount++;
            
            document.getElementById('wheelFrame').classList.add('spinning');
            document.getElementById('spinSound').play();

            // المنطق الافتراضي للعشوائية
            let winnerIdx = Math.floor(Math.random() * names.length);

            // تطبيق شروط التحكم إذا وجدت
            const cond = conditions.find(c => c.turn === spinCount && names.includes(c.name));
            if (cond) {
                if (Math.random() * 100 <= cond.percent) {
                    winnerIdx = names.indexOf(cond.name);
                }
            }
            
            selectedIndex = winnerIdx;

            const sliceDeg = 360 / names.length;
            const extraRot = 360 * 12; // دورات سريعة
            const targetRot = extraRot + (360 - (winnerIdx * sliceDeg) - (sliceDeg / 2));
            
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 6s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${targetRot}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('wheelFrame').classList.remove('spinning');
                document.getElementById('winnerText').innerText = names[selectedIndex];
                document.getElementById('winnerModal').classList.remove('hidden');
                document.getElementById('winSound').play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }, 6000);
        }

        function closeWinner() {
            names.splice(selectedIndex, 1);
            document.getElementById('winnerModal').classList.add('hidden');
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            
            if (names.length > 0) drawWheel();
            else {
                alert("انتهى المهرجان! 🎉");
                location.reload();
            }
        }
    </script>
</body>
</html>
