<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة حظ درعه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #111;
            color: #fff;
        }

        /* خلفية متداخلة باستخدام الصورة المرفوعة */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('03232 (1920 x 1080 px) (2).jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* طبقة داكنة عصرية فوق الخلفية */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); /* تم تقليل التعتيم لتوضيح الصورة */
            backdrop-filter: none; /* تم إزالة الضبابية بالكامل */
            z-index: -1;
        }

        /* تصميم السهم الذهبي العصري */
        .golden-arrow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #FFD700;
            z-index: 20;
            filter: drop-shadow(0px 0px 15px rgba(255, 215, 0, 0.8));
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            aspect-ratio: 1/1;
        }

        /* تأثير توهج حول العجلة */
        .wheel-wrapper::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, #C6007E, #FFD700, #C6007E);
            z-index: -1;
            filter: blur(20px);
            opacity: 0.7;
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 0.9; transform: scale(1.02); }
        }

        /* تم تحديد الـ id هنا لمنع تطبيق التأثير الدائري على شاشة الاحتفال */
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 6px solid #222;
        }

        /* تأثير زجاجي داكن واحترافي للحاويات */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* تخصيص التمرير داخل صندوق النصوص */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(198, 0, 126, 0.5);
            border-radius: 8px;
        }

        .text-gradient {
            background: linear-gradient(to left, #FFD700, #C6007E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <!-- زر تكبير الشاشة (Full Screen) -->
    <button id="btn-fullscreen" class="absolute top-4 left-4 z-50 p-3 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur-md transition-all border border-white/20 text-white shadow-lg" title="تكبير/تصغير الشاشة">
        <!-- أيقونة التكبير -->
        <svg id="icon-expand" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
        </svg>
        <!-- أيقونة التصغير (مخفية افتراضياً) -->
        <svg id="icon-compress" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 14h4v4m0-4l-5 5m11-1h4v4m0-4l-5 5M14 10h4V6m0 4l-5-5M10 10H6V6m0 4l-5-5" />
        </svg>
    </button>

    <!-- اللوجوهات في أعلى اليمين -->
    <div class="absolute top-4 right-4 z-50 flex flex-col gap-2 w-40 md:w-56 drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">
        <!-- الصف الأول: الشعارين (D و deraah) متقاربين -->
        <div class="flex justify-center items-center gap-1 h-10 md:h-14">
            <img src="D.png" alt="D Logo" class="h-full w-auto object-contain max-w-[48%]" onerror="this.style.display='none'">
            <img src="deraah_logo.png" alt="Deraah Logo" class="h-full w-auto object-contain max-w-[48%]" onerror="this.style.display='none'">
        </div>
        <!-- الصف الثاني: الشعار العريض -->
        <div class="w-full h-8 md:h-12">
            <img src="03232 (1920 x 1080 px) (32).png" alt="Wide Logo" class="w-full h-full object-contain" onerror="this.style.display='none'">
        </div>
    </div>

    <!-- الخلفية والصورة المتداخلة -->
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <!-- الشاشة الأولى: إدخال الأسماء -->
    <div id="input-screen" class="glass-panel p-8 md:p-12 rounded-[2rem] w-full max-w-xl z-10 transition-all duration-500 mt-20">
        <div class="flex justify-center items-center mb-6">
            <h1 class="text-3xl font-black tracking-wide">قائمة المشاركين</h1>
        </div>
        
        <textarea id="names-input" rows="8" class="w-full p-5 bg-black/40 border border-white/20 rounded-2xl focus:ring-2 focus:ring-[#FFD700] focus:border-transparent outline-none resize-none text-xl mb-8 shadow-inner text-white transition-all" placeholder="أدخل الأسماء..."></textarea>
        
        <button id="btn-next" class="w-full bg-gradient-to-l from-[#C6007E] to-[#9e0064] hover:from-[#e30090] hover:to-[#C6007E] text-white font-black text-2xl py-5 rounded-2xl shadow-[0_0_20px_rgba(198,0,126,0.5)] transition-all transform hover:scale-[1.02] active:scale-95 border border-white/20">
            بدء السحب
        </button>
    </div>

    <!-- الشاشة الثانية: العجلة -->
    <div id="wheel-screen" class="hidden flex-col items-center w-full z-10 transition-all duration-500 mt-16">
        <div class="wheel-wrapper mb-12 relative cursor-pointer" id="wheel-container">
            <div class="golden-arrow"></div>
            <canvas id="wheel" width="800" height="800"></canvas>
        </div>
        
        <button id="btn-spin" class="bg-gradient-to-l from-[#FFD700] to-[#d4af37] text-black hover:scale-[1.05] font-black text-3xl py-5 px-20 rounded-full shadow-[0_0_30px_rgba(255,215,0,0.6)] transition-all active:scale-95 border-2 border-white/50">
            ســـحـــب !
        </button>
        <button id="btn-back" class="mt-8 text-white/50 hover:text-white transition-colors text-lg font-bold flex items-center gap-2">
            <span>تعديل القائمة</span>
        </button>
    </div>

    <!-- النافذة المنبثقة (Popup) للفائز -->
    <div id="winner-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="glass-panel rounded-[2rem] p-10 max-w-lg w-full text-center shadow-[0_0_50px_rgba(198,0,126,0.3)] transform scale-95 transition-transform duration-300 relative overflow-hidden" id="modal-content">
            
            <div class="relative z-10">
                <div class="text-7xl mb-6 drop-shadow-2xl">🏆</div>
                <h2 class="text-3xl font-bold text-white/90 mb-4 tracking-widest">ألـــف مـــبـــروك!</h2>
                <p id="winner-name" class="text-5xl font-black text-gradient mb-10 py-6 bg-black/30 rounded-2xl border border-white/10 shadow-inner"></p>
                
                <button id="btn-continue" class="w-full bg-white text-black hover:bg-gray-200 font-black py-4 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.4)] transition-all text-xl hover:scale-105 active:scale-95">
                    متابعة
                </button>
            </div>
        </div>
    </div>

    <script>
        let names = [];
        let canvas = document.getElementById('wheel');
        let ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;
        let lastSliceIndex = -1;
        let currentWinnerIndex = -1;

        // ألوان عصرية للعجلة (تناسق احترافي: درجات الوردي، الذهبي، والأسود)
        const colors = ['#C6007E', '#1A1A1A', '#FFD700', '#2D2D2D', '#9e0064', '#0f0f0f'];
        const textColors = ['#FFFFFF', '#FFFFFF', '#000000', '#FFFFFF', '#FFFFFF', '#FFD700'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // ----------------------------------------------------
        // نظام عشوائي مشفر وآمن 100% (Cryptographically Secure)
        // ----------------------------------------------------
        function getSecureRandom() {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] / (0xFFFFFFFF + 1); // يعطي رقم بين 0 و 1
        }

        function secureShuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(getSecureRandom() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        // ----------------------------------------------------

        // صوت التكة الميكانيكية (Spin Wheel Click)
        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;

            // الجزء الحاد من الطقة (Click)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.02);
            gainNode.gain.setValueAtTime(0.4, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
            osc.start(t);
            osc.stop(t + 0.02);

            // الجزء العريض من الطقة لمحاكاة الاصطدام الخشبي/البلاستيكي
            const osc2 = audioCtx.createOscillator();
            const gainNode2 = audioCtx.createGain();
            osc2.connect(gainNode2);
            gainNode2.connect(audioCtx.destination);
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(200, t);
            osc2.frequency.exponentialRampToValueAtTime(50, t + 0.04);
            gainNode2.gain.setValueAtTime(0.3, t);
            gainNode2.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
            osc2.start(t);
            osc2.stop(t + 0.04);
        }

        // المؤثرات الاحتفالية الشاملة (موسيقى + تصفيق حار)
        function playWinSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            
            // 1. الأوتار الاحتفالية (Fanfare)
            const chords = [
                [523.25, 659.25, 783.99], // C
                [587.33, 698.46, 880.00], // Dm
                [698.46, 880.00, 1046.50, 1318.51] // Fmaj7 (عالي ومبهج)
            ];
            
            chords.forEach((chord, index) => {
                const startTime = t + index * 0.18;
                chord.forEach(freq => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.2, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.6);
                    osc.start(startTime);
                    osc.stop(startTime + 0.6);
                });
            });

            // 2. محاكاة التصفيق الحار والكثيف (White Noise Filtered)
            const bufferSize = audioCtx.sampleRate * 5; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1); 
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 800; // نطاق أعرض لصوت تصفيق ضخم
            filter.Q.value = 0.3;

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0, t);
            noiseGain.gain.linearRampToValueAtTime(1.0, t + 0.5); // تصاعد التصفيق بقوة أكبر
            noiseGain.gain.setValueAtTime(1.0, t + 3.0); // الثبات للحظات أطول
            noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 5.0); // خفوت تدريجي
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start(t);
        }

        // إطلاق احتفالات كثيفة ومبهرة
        function fireConfetti() {
            const duration = 4000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 8,
                    angle: 60,
                    spread: 80,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#C6007E', '#FFD700', '#ffffff', '#000000'],
                    zIndex: 100
                });
                confetti({
                    particleCount: 8,
                    angle: 120,
                    spread: 80,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#C6007E', '#FFD700', '#ffffff', '#000000'],
                    zIndex: 100
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (names.length === 0) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 15;
            const arc = Math.PI * 2 / names.length;

            for (let i = 0; i < names.length; i++) {
                const angle = currentRotation + i * arc - Math.PI / 2; 
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
                ctx.lineTo(centerX, centerY);
                
                ctx.fillStyle = colors[i % colors.length];
                if (names.length % colors.length !== 0 && i === names.length - 1 && colors[i % colors.length] === colors[0]) {
                    ctx.fillStyle = colors[1];
                }
                ctx.fill();
                
                // خطوط فاصلة أنيقة
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#111';
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                
                // تحديد لون النص بناءً على الشريحة
                ctx.fillStyle = textColors[i % textColors.length];
                if (names.length % colors.length !== 0 && i === names.length - 1 && colors[i % colors.length] === colors[0]) {
                    ctx.fillStyle = textColors[1];
                }
                
                ctx.font = "900 " + (names.length > 20 ? "18px" : "32px") + " Cairo";
                
                // تأثير ظل خفيف للنصوص لزيادة الوضوح
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                
                ctx.fillText(names[i], radius - 40, 10);
                ctx.restore();
            }
        }

        function spin() {
            if (isSpinning || names.length === 0) return;
            isSpinning = true;
            
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // استخدام العشوائية المشفرة بدلاً من العادية
            const spinTimeTotal = getSecureRandom() * 3000 + 5000; 
            const spinStart = Date.now();
            const startRotation = currentRotation;
            const targetRotation = currentRotation + (getSecureRandom() * 10 + 15) * Math.PI * 2; 

            const arc = Math.PI * 2 / names.length;

            // دالة تخفيف السرعة احترافية (Ease Out)
            function easeOutQuart(t, b, c, d) {
                t /= d;
                t--;
                return -c * (t * t * t * t - 1) + b;
            }

            function animate() {
                const now = Date.now();
                const elapsed = now - spinStart;
                
                if (elapsed < spinTimeTotal) {
                    currentRotation = easeOutQuart(elapsed, startRotation, targetRotation - startRotation, spinTimeTotal);
                    drawWheel();

                    let normalizedRot = (Math.PI * 2 - (currentRotation % (Math.PI * 2))) % (Math.PI * 2);
                    let currentSlice = Math.floor(normalizedRot / arc) % names.length;

                    if (currentSlice !== lastSliceIndex) {
                        playTick(); // تشغيل صوت التكة الجديدة هنا
                        lastSliceIndex = currentSlice;
                    }

                    requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotation;
                    drawWheel();
                    isSpinning = false;
                    
                    let normalizedRot = (Math.PI * 2 - (currentRotation % (Math.PI * 2))) % (Math.PI * 2);
                    currentWinnerIndex = Math.floor(normalizedRot / arc) % names.length;
                    
                    showWinner(names[currentWinnerIndex]);
                }
            }
            animate();
        }

        function showWinner(winnerName) {
            playWinSound(); // تشغيل أصوات الفوز والتصفيق
            fireConfetti();
            document.getElementById('winner-name').innerText = winnerName;
            
            const modal = document.getElementById('winner-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('winner-modal');
            const modalContent = document.getElementById('modal-content');
            
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // زر تكبير الشاشة (Full Screen)
        const fullscreenBtn = document.getElementById('btn-fullscreen');
        const iconExpand = document.getElementById('icon-expand');
        const iconCompress = document.getElementById('icon-compress');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`خطأ في تشغيل وضع ملء الشاشة: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // تغيير الأيقونة عند تبديل حالة الشاشة
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                iconExpand.classList.add('hidden');
                iconCompress.classList.remove('hidden');
            } else {
                iconExpand.classList.remove('hidden');
                iconCompress.classList.add('hidden');
            }
        });

        // زر البدء
        document.getElementById('btn-next').addEventListener('click', () => {
            const inputText = document.getElementById('names-input').value;
            names = inputText.split('\n').map(n => n.trim()).filter(n => n.length > 0);
            
            if (names.length === 0) return;

            // خلط الأسماء عشوائياً بشكل آمن قبل توزيعها على العجلة
            secureShuffle(names);

            document.getElementById('input-screen').classList.add('hidden');
            document.getElementById('wheel-screen').classList.remove('hidden');
            document.getElementById('wheel-screen').classList.add('flex');
            
            currentRotation = 0;
            drawWheel();
        });

        // زر العودة
        document.getElementById('btn-back').addEventListener('click', () => {
            document.getElementById('wheel-screen').classList.add('hidden');
            document.getElementById('wheel-screen').classList.remove('flex');
            document.getElementById('input-screen').classList.remove('hidden');
        });

        // السحب عبر الضغط على العجلة نفسها أو الزر
        document.getElementById('btn-spin').addEventListener('click', spin);
        document.getElementById('wheel-container').addEventListener('click', spin);

        // زر المتابعة (يحذف الفائز تلقائياً)
        document.getElementById('btn-continue').addEventListener('click', () => {
            if (currentWinnerIndex > -1) {
                names.splice(currentWinnerIndex, 1); // حذف تلقائي للاسم
                currentWinnerIndex = -1;
                drawWheel();
            }
            closeModal();
            
            if(names.length === 0) {
                setTimeout(() => {
                    document.getElementById('btn-back').click();
                }, 400);
            }
        });

    </script>
</body>
</html>
