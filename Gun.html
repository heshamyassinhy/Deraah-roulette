<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كازينو الحظ - الأكشن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle, #1a0f0f 0%, #000000 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .casino-panel {
            background: rgba(20, 20, 20, 0.95);
            border: 4px solid #d4af37;
            border-radius: 40px;
            box-shadow: 0 0 30px #d4af3755, inset 0 0 20px #ff000033;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 550px; 
            aspect-ratio: 1 / 1; 
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 15px solid #222;
            border-radius: 50%;
            padding: 5px;
            background: #111;
            box-shadow: 0 0 0 5px #d4af37;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* المسدس التفاعلي */
        .gun-container {
            position: absolute;
            top: 50%;
            left: -120px;
            transform: translateY(-50%) rotate(15deg);
            width: 180px;
            z-index: 50;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            opacity: 0;
            pointer-events: none;
        }

        .gun-active {
            opacity: 1;
            left: -60px;
            transform: translateY(-50%) rotate(0deg);
        }

        .gun-fire {
            animation: recoil 0.2s ease-out;
        }

        @keyframes recoil {
            0% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(-20px) rotate(-10deg); }
            100% { transform: translateY(-50%) translateX(0); }
        }

        .muzzle-flash {
            position: absolute;
            right: -40px;
            top: 10px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 0%, #ffeb3b 40%, transparent 70%);
            border-radius: 50%;
            display: none;
            z-index: 60;
        }

        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #d4af37;
            z-index: 40;
            filter: drop-shadow(0 0 10px #d4af37);
        }

        .spin-btn {
            background: linear-gradient(180deg, #d4af37 0%, #aa8a2e 100%);
            border: 2px solid #5c4a16;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .spin-btn:hover:not(:disabled) {
            filter: brightness(1.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px #d4af37;
        }

        select option {
            background-color: #1a0f0f !important;
            color: #d4af37 !important;
        }

        .winner-pop {
            animation: explode 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .neon-text {
            color: #d4af37;
            text-shadow: 0 0 10px #d4af37, 0 0 20px #d4af37;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="casino-panel p-8 w-full max-w-4xl shadow-2xl relative overflow-hidden">
        
        <!-- Step 1 -->
        <div id="step1" class="text-center">
            <h1 class="text-5xl font-black mb-8 neon-text">كازينو الموت والحظ</h1>
            <textarea id="namesInput" rows="6" class="w-full p-4 rounded-xl bg-black/50 border-2 border-red-900 text-white text-lg outline-none focus:border-yellow-600 mb-6" placeholder="أدخل أسماء الضحايا هنا..."></textarea>
            <button onclick="goToStep2()" class="w-full spin-btn py-5 rounded-xl text-2xl font-black text-black uppercase tracking-widest">دخول الصالة 🎰</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="hidden text-center">
            <h2 class="text-3xl font-bold mb-6 text-red-600">غرفة التحكم السرية 🔫</h2>
            <div class="bg-black/40 p-6 rounded-2xl mb-6 flex items-center gap-4 border border-red-900">
                <input type="checkbox" id="enableSpecial" class="w-8 h-8 accent-yellow-500 cursor-pointer" onchange="toggleSpecial()">
                <label for="enableSpecial" class="text-xl font-bold cursor-pointer text-gray-300">تفعيل التلاعب بالنتائج</label>
            </div>
            <div id="specialControls" class="hidden mb-6 space-y-4 max-h-[300px] overflow-y-auto px-2">
                <div id="conditionsList" class="space-y-4"></div>
                <button onclick="addConditionRow()" class="text-yellow-500 font-bold hover:underline">+ إضافة سيناريو جديد</button>
            </div>
            <div class="flex gap-4">
                <button onclick="showStep(1)" class="flex-1 bg-gray-800 py-4 rounded-xl font-bold hover:bg-gray-700">تعديل الأسماء</button>
                <button onclick="goToStep3()" class="flex-1 spin-btn py-4 rounded-xl text-black font-bold">بدء الرهان 🎲</button>
            </div>
        </div>

        <!-- Step 3 -->
        <div id="step3" class="hidden text-center relative">
            <h2 class="text-3xl font-black text-yellow-500 mb-6 neon-text">من سيتلقى الرصاصة؟</h2>
            
            <div class="wheel-container" id="wheelFrame">
                <div class="pointer"></div>
                
                <!-- المسدس -->
                <div id="gun" class="gun-container">
                    <div id="muzzleFlash" class="muzzle-flash"></div>
                    <!-- رسم مسدس مبسط SVG -->
                    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 50 L140 50 L140 30 L180 30 L180 60 L140 60 L140 100 L110 100 L110 60 L10 60 Z" fill="#333" stroke="#000" stroke-width="2"/>
                        <rect x="145" y="35" width="30" height="20" fill="#555"/>
                        <circle cx="125" cy="75" r="10" fill="none" stroke="#222" stroke-width="3"/>
                        <path d="M125 75 L125 85" stroke="#222" stroke-width="3"/>
                    </svg>
                </div>

                <canvas id="wheelCanvas" width="800" height="800"></canvas>
            </div>

            <div class="mt-10">
                <button id="spinBtn" onclick="startSpin()" class="spin-btn px-20 py-6 rounded-full text-3xl font-black text-black">اسحب الزناد!</button>
                <p id="counter" class="mt-4 text-red-700 font-bold text-xl uppercase"></p>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winnerModal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-6">
        <div class="winner-pop bg-black border-4 border-yellow-600 p-12 rounded-[2rem] text-center max-w-md w-full shadow-[0_0_50px_#d4af37]">
            <div class="text-6xl mb-4">💥</div>
            <h3 class="text-2xl text-red-600 mb-2 font-black">لقد أصيب!</h3>
            <div id="winnerText" class="text-6xl font-black text-white mb-8 tracking-tighter"></div>
            <button onclick="closeWinner()" class="w-full spin-btn text-black py-5 rounded-xl font-bold text-2xl">التالي 💀</button>
        </div>
    </div>

    <!-- Sounds -->
    <audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>
    <audio id="gunShot" src="https://assets.mixkit.co/active_storage/sfx/1691/1691-preview.mp3"></audio>

    <script>
        let names = [];
        let conditions = [];
        let spinCount = 0;
        let isSpinning = false;
        let selectedIndex = -1;

        const casinoColors = [
            ['#d4af37', '#8e6d13'], // ذهبي
            ['#b71c1c', '#4a0000'], // أحمر غامق
            ['#111111', '#000000'], // أسود
            ['#1b5e20', '#0a2e0a']  // أخضر كازينو
        ];

        function showStep(s) {
            document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('step' + s).classList.remove('hidden');
        }

        function toggleSpecial() {
            document.getElementById('specialControls').classList.toggle('hidden', !document.getElementById('enableSpecial').checked);
            if (document.getElementById('conditionsList').children.length === 0) addConditionRow();
        }

        function addConditionRow() {
            const list = document.getElementById('conditionsList');
            const row = document.createElement('div');
            row.className = "p-4 bg-red-950/20 border border-red-900/50 flex flex-wrap gap-4 items-end rounded-xl";
            let options = names.map(n => `<option value="${n}">${n}</option>`).join('');
            row.innerHTML = `
                <div class="flex-1 min-w-[140px]">
                    <label class="text-[10px] text-yellow-600 block mb-1 font-bold">الضحية المحددة</label>
                    <select class="cond-name w-full p-2 rounded bg-black text-white border border-yellow-900">${options}</select>
                </div>
                <div class="w-20">
                    <label class="text-[10px] text-yellow-600 block mb-1 font-bold">النسبة %</label>
                    <input type="number" class="cond-percent w-full p-2 rounded bg-black text-white border border-yellow-900" value="100">
                </div>
                <div class="w-20">
                    <label class="text-[10px] text-yellow-600 block mb-1 font-bold">رقم السحبة</label>
                    <input type="number" class="cond-turn w-full p-2 rounded bg-black text-white border border-yellow-900" value="1">
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-500 font-bold">🗑</button>`;
            list.appendChild(row);
        }

        function goToStep2() {
            const val = document.getElementById('namesInput').value.trim();
            names = val.split('\n').map(n => n.trim()).filter(n => n !== "");
            if (names.length < 2) return alert("الكازينو يحتاج ضحيتين على الأقل!");
            showStep(2);
        }

        function goToStep3() {
            conditions = [];
            if (document.getElementById('enableSpecial').checked) {
                document.querySelectorAll('#conditionsList > div').forEach(row => {
                    conditions.push({
                        name: row.querySelector('.cond-name').value,
                        percent: parseInt(row.querySelector('.cond-percent').value),
                        turn: parseInt(row.querySelector('.cond-turn').value)
                    });
                });
            }
            showStep(3);
            setTimeout(drawWheel, 100);
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = cx - 30;
            const slice = (Math.PI * 2) / names.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = i * slice;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, angle, angle + slice);
                
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                const colorSet = casinoColors[i % casinoColors.length];
                grad.addColorStop(0, colorSet[0]);
                grad.addColorStop(1, colorSet[1]);
                
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#d4af37";
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle + slice / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (i % casinoColors.length === 2) ? "#d4af37" : "white";
                ctx.font = "bold 45px Cairo";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 10;
                ctx.fillText(name.substring(0, 12), radius - 60, 15);
                ctx.restore();
            });

            // Center
            ctx.beginPath();
            ctx.arc(cx, cy, 40, 0, Math.PI * 2);
            ctx.fillStyle = "#222";
            ctx.fill();
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 8;
            ctx.stroke();
            
            document.getElementById('counter').innerText = `الباقون على قيد الحياة: ${names.length}`;
        }

        function startSpin() {
            if (isSpinning || names.length === 0) return;
            isSpinning = true;
            spinCount++;
            
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('spinSound').play();
            document.getElementById('gun').classList.remove('gun-active');

            let winnerIdx = Math.floor(Math.random() * names.length);
            const cond = conditions.find(c => c.turn === spinCount && names.includes(c.name));
            if (cond && Math.random() * 100 <= cond.percent) winnerIdx = names.indexOf(cond.name);
            
            selectedIndex = winnerIdx;

            const sliceDeg = 360 / names.length;
            const rotations = 15; 
            const targetRot = (rotations * 360) + (360 - (winnerIdx * sliceDeg) - (sliceDeg / 2));
            
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${targetRot}deg)`;

            setTimeout(() => {
                // إظهار المسدس والضرب
                const gun = document.getElementById('gun');
                const flash = document.getElementById('muzzleFlash');
                
                gun.classList.add('gun-active');
                
                setTimeout(() => {
                    gun.classList.add('gun-fire');
                    flash.style.display = 'block';
                    document.getElementById('gunShot').play();
                    
                    // تأثير الهزة للكازينو
                    document.getElementById('app').style.animation = "recoil 0.1s 3";
                    
                    setTimeout(() => {
                        flash.style.display = 'none';
                        gun.classList.remove('gun-fire');
                        
                        document.getElementById('winnerText').innerText = names[selectedIndex];
                        document.getElementById('winnerModal').classList.remove('hidden');
                        confetti({ particleCount: 200, colors: ['#ff0000', '#000000', '#d4af37'] });
                        isSpinning = false;
                        document.getElementById('spinBtn').disabled = false;
                    }, 200);
                }, 800);
            }, 6000);
        }

        function closeWinner() {
            names.splice(selectedIndex, 1);
            document.getElementById('winnerModal').classList.add('hidden');
            document.getElementById('gun').classList.remove('gun-active');
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            document.getElementById('app').style.animation = "none";
            
            if (names.length > 0) drawWheel();
            else {
                alert("انتهى الروليت.. لا يوجد ناجون!");
                location.reload();
            }
        }
    </script>
</body>
</html>
